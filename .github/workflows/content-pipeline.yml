name: Content Pipeline (Monitor, Ingest, Generate)

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch: {}     # Allow manual trigger from GitHub Actions UI

jobs:
  pipeline:
    name: Run content pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 1. Monitor for changes
        run: npx tsx scripts/monitor.ts
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: 2. Ingest news from connectors (RSS feeds, etc.)
        run: |-
          cat > /tmp/run-connectors.ts << 'SCRIPT'
          import { runConnectors } from "./src/lib/connectors/runner";
          import "./src/lib/connectors/register-all";

          (async () => {
            try {
              const results = await runConnectors({ townId: "needham", force: true });
              console.log(`✓ Connectors completed: ${results.length} sources processed`);
              const totalUpserted = results.reduce((s, r) => s + r.itemsUpserted, 0);
              const totalErrors = results.reduce((s, r) => s + r.errors.length, 0);
              console.log(`  Items upserted: ${totalUpserted}, Errors: ${totalErrors}`);
              if (totalErrors > 0) process.exit(1);
            } catch (err) {
              console.error("✗ Connector run failed:", err);
              process.exit(1);
            }
          })();
          SCRIPT
          npx tsx /tmp/run-connectors.ts
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}

      - name: 2b. Ingest document pages from needhamma.gov
        run: npx tsx scripts/ingest.ts --limit=50
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLAMAPARSE_API_KEY: ${{ secrets.LLAMAPARSE_API_KEY }}
          UPSTASH_VECTOR_REST_URL: ${{ secrets.UPSTASH_VECTOR_REST_URL }}
          UPSTASH_VECTOR_REST_TOKEN: ${{ secrets.UPSTASH_VECTOR_REST_TOKEN }}

      - name: 3. Generate daily articles and brief
        run: npx tsx scripts/generate-articles.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
