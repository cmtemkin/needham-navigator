<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Needham Navigator — Offline</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; color: #333; }
    .container { text-align: center; padding: 2rem; }
    .icon { width: 64px; height: 64px; background: linear-gradient(135deg, #1B4D7A, #2E6EA6); border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: white; font-weight: 800; font-size: 28px; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #666; max-width: 360px; margin: 0 auto; }
    button { margin-top: 1.5rem; padding: 0.75rem 2rem; background: #1B4D7A; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2E6EA6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">N</div>
    <h1>You're offline</h1>
    <p>Needham Navigator needs an internet connection to answer your questions. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
